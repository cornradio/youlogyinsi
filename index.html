<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐私政策导航</title>
    <style>
        :root {
            --bg: #f3f6fa;
            --card-bg: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #1f6feb;
            --border: #e5e7eb;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #eef4ff 0%, var(--bg) 100%);
            color: var(--text);
            min-height: 100vh;
        }
        .wrap {
            max-width: 920px;
            margin: 0 auto;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 30px;
        }
        .subtitle {
            margin: 0 0 24px;
            color: var(--muted);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }
        .card {
            display: block;
            padding: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 4px 10px rgba(31, 111, 235, 0.08);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(31, 111, 235, 0.14);
        }
        .card h2 {
            margin: 0 0 8px;
            font-size: 22px;
            color: #0b4dbb;
        }
        .card p {
            margin: 0;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>隐私政策导航</h1>
        <p class="subtitle">快速进入各应用隐私政策页面</p>
        <div class="grid">
            <a class="card" href="./Youlog-privacy/index.html">
                <h2>Youlog</h2>
                <p>查看 Youlog 隐私政策</p>
            </a>
            <a class="card" href="./Jarvis-privacy/index.html">
                <h2>Jarvis</h2>
                <p>查看 Jarvis 隐私政策</p>
            </a>
            <a class="card" href="./fuckappstoreImageResolution/index.html">
                <h2>fuckappstoreImageResolution</h2>
                <p>查看 fuckappstoreImageResolution 页面</p>
            </a>
        </div>
    </div>
</body>
</html>
